<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root { 
    --p: #000000; 
    --bg: #F0F0F0; 
    --accent: #FFD60A; /* Yellow */
    --gold: #D4AF37; /* Elegant Gold */
    --broken-white: #F8F7F2;
    --cyan: #00F0FF;
    --pink: #FF00E5;
    --green: #00FF41;
    --brut-border: 4px solid #000;
    --brut-shadow: 6px 6px 0px #000;
    --brut-shadow-sm: 4px 4px 0px #000;
    --brut-shadow-hover: 2px 2px 0px #000;
  }
  
  body { 
    background: var(--bg); 
    font-family: 'Space Grotesk', sans-serif; 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; 
    color: #000;
  }
  .hidden { display: none !important; }
  
  /* Layout */
  .sidebar { 
    width: 280px; height: 100vh; position: fixed; 
    background: var(--accent); border: var(--brut-border); 
    margin: 10px; border-radius: 0; padding: 20px; z-index: 1000; 
    box-shadow: var(--brut-shadow);
  }
  .content { margin-left: 310px; padding: 30px; flex: 1; }
  #p-resp { flex: 1; padding: 20px; }
  
  /* Neo-Brutalism Cards */
  .brut-card {
    background: white;
    border: var(--brut-border);
    box-shadow: var(--brut-shadow);
    padding: 25px;
    margin-bottom: 25px;
    transition: all 0.2s ease;
    border-radius: 0;
  }
  
  .brut-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 8px 8px 0px #000;
  }

  .q-card { 
    background: white; border: var(--brut-border); 
    padding: 25px; margin-bottom: 25px; 
    box-shadow: var(--brut-shadow);
    transition: 0.2s; 
  }
  .q-card.filled { background: #e6ffec; }
  
  /* Buttons */
  .btn-brut {
    background: var(--cyan);
    color: #000;
    border: var(--brut-border);
    box-shadow: var(--brut-shadow-sm);
    font-weight: 700;
    text-transform: uppercase;
    padding: 10px 25px;
    border-radius: 0;
    transition: 0.2s;
  }
  
  .btn-brut:hover {
    transform: translate(2px, 2px);
    box-shadow: 0px 0px 0px #000;
    background: var(--cyan);
    color: #000;
  }

  .btn-brut-pink { background: var(--pink); color: white; }
  .btn-brut-pink:hover { background: var(--pink); color: white; }
  
  .btn-brut-green { background: var(--green); }
  .btn-brut-green:hover { background: var(--green); }

  /* Input fields */
  .form-control, .form-select {
    border: var(--brut-border) !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    padding: 12px !important;
    font-weight: 600;
  }
  
  .form-control:focus, .form-select:focus {
    background: var(--accent);
    border-color: #000 !important;
  }

  /* Deskripsi Box */
  .deskripsi-box { 
    background-color: #fff; 
    border: 2px solid #000;
    padding: 20px; 
    font-size: 0.95rem; 
    color: #000; 
    line-height: 1.6; 
    margin-bottom: 20px;
    box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
  }
  .deskripsi-box strong { color: #000; text-decoration: underline; }

  /* Footer */
  .main-footer {
    text-align: center; padding: 20px; font-weight: 700;
    background: #000; color: #fff; border-top: var(--brut-border);
  }
  .eval-footer { margin-left: 310px; }

  .sticky-top { 
    background: var(--accent); border: var(--brut-border); 
    margin: 10px; box-shadow: var(--brut-shadow-sm);
    z-index: 1020; padding: 15px; 
  }

  /* Progress Bar */
  .progress { height: 30px; border: var(--brut-border); border-radius: 0; background: #fff; overflow: visible; }
  .progress-bar { background: var(--green); color: #000; font-weight: 800; border-right: var(--brut-border); }

  /* Animations */
  @keyframes brutalFloat {
    0% { transform: translate(0, 0); }
    50% { transform: translate(-4px, -4px); }
    100% { transform: translate(0, 0); }
  }

  .brut-float { animation: brutalFloat 3s ease-in-out infinite; }

  .bg-vibrant {
    background: var(--broken-white);
    background-image: 
      linear-gradient(#000 2px, transparent 2px),
      linear-gradient(90deg, #000 2px, transparent 2px);
    background-size: 40px 40px;
    min-height: 100vh;
  }

  .badge-brut {
    background: #000;
    color: #fff;
    padding: 5px 15px;
    font-weight: 700;
    text-transform: uppercase;
    border-radius: 0;
  }

  /* Modal */
  .modal-content {
    border: var(--brut-border);
    box-shadow: 12px 12px 0px #000;
    border-radius: 0;
  }
  .modal-header { border-bottom: var(--brut-border); background: var(--accent); }
  .modal-footer { border-top: var(--brut-border); }

  @media (max-width: 768px) { 
    .sidebar { display: none; } 
    .content { margin-left: 0; } 
    .eval-footer { margin-left: 0; }
    .opd-grid { grid-template-columns: 1fr !important; }
  }

  /* === OPD Compact Card Grid === */
  .opd-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  @media (max-width: 1200px) { .opd-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 992px) { .opd-grid { grid-template-columns: repeat(2, 1fr); } }

  .opd-item {
    background: white;
    border: 3px solid #000;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left-width: 6px;
    position: relative;
    overflow: hidden;
  }
  .opd-item:hover {
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0px #000;
  }
  .opd-item:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0px #000;
  }

  /* Status colors via left border */
  .opd-item--belum { border-left-color: #ff6b6b; }
  .opd-item--sebagian { border-left-color: #ffd43b; }
  .opd-item--selesai { border-left-color: #00FF41; background: #f0fff4; }

  .opd-item__info {
    flex: 1;
    min-width: 0;
  }
  .opd-item__name {
    font-weight: 700;
    font-size: 0.78rem;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .opd-item__status {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .opd-item__badge {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #000;
    font-weight: 800;
    font-size: 0.7rem;
  }
  .opd-item__badge--belum { background: #ff6b6b; color: #fff; }
  .opd-item__badge--sebagian { background: #ffd43b; color: #000; }
  .opd-item__badge--selesai { background: #00FF41; color: #000; }

  /* Filter button active state */
  [data-filter].active {
    box-shadow: 0 0 0 #000 !important;
    transform: translate(2px, 2px);
    outline: 3px solid #000;
  }
</style>
